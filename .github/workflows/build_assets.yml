name: Build & Commit Assets

on:
  push:
    branches:
      - main
    paths:
      - 'packages/Webkul/Shop/src/Resources/assets/**'
      - 'packages/Webkul/Suggestion/src/Resources/assets/**'
      - 'packages/Webkul/Shop/package.json'
      - 'packages/Webkul/Suggestion/package.json'
      - '.github/workflows/build_assets.yml'

jobs:
  build-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Build Shop Assets
        run: |
          cd packages/Webkul/Shop
          npm install
          npm run build

      - name: Build Suggestion Assets
        run: |
          cd packages/Webkul/Suggestion
          npm install
          npm run build

      - name: Check if assets changed
        id: check-changes
        run: |
          if git diff --quiet public/themes/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push Updated Assets
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add public/themes/shop/default/build/
          git add public/themes/suggestion/default/build/
          git commit -m "chore: rebuild shop and suggestion assets [skip ci]"
          git push origin main

      - name: Report Status
        run: |
          if [ "${{ steps.check-changes.outputs.changed }}" = "true" ]; then
            echo "✅ Assets rebuilt and committed"
          else
            echo "✅ Assets already up-to-date"
          fi
