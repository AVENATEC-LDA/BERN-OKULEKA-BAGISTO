services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dokploy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      ELASTICSEARCH_HOST: http://elasticsearch:9200
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
      RUN_INDEXERS: "${RUN_INDEXERS:-false}"
    depends_on:
      - elasticsearch
    volumes:
      - bagisto_storage:/var/www/bagisto/storage
      - bagisto_bootstrap_cache:/var/www/bagisto/bootstrap/cache
    expose:
      - "80"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.20
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      bootstrap.memory_lock: "false"
      ingest.geoip.downloader.enabled: "false"
      JAVA_TOOL_OPTIONS: "-Djdk.management.cgroupv2.enabled=false -Djdk.internal.platform.cgroupv2.enabled=false -XX:-UseContainerSupport -XX:+IgnoreUnrecognizedVMOptions"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m -Djdk.management.cgroupv2.enabled=false -Djdk.internal.platform.cgroupv2.enabled=false -XX:-UseContainerSupport -XX:+IgnoreUnrecognizedVMOptions"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s
    volumes:
      - bagisto_elasticsearch:/usr/share/elasticsearch/data

volumes:
  bagisto_storage:
  bagisto_bootstrap_cache:
  bagisto_elasticsearch:
