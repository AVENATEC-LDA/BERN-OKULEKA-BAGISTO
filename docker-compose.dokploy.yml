services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dokploy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      ELASTICSEARCH_HOST: http://elasticsearch:9200
      CACHE_STORE: redis
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
      RUN_INDEXERS: "${RUN_INDEXERS:-false}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - bagisto_storage:/var/www/bagisto/storage
      - bagisto_bootstrap_cache:/var/www/bagisto/bootstrap/cache
    expose:
      - "80"

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-bagisto}"
      MYSQL_USER: "${DB_USERNAME:-bagisto}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-bagisto}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-change-this-root-password}"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - bagisto_mysql:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - bagisto_redis:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    volumes:
      - bagisto_elasticsearch:/usr/share/elasticsearch/data

volumes:
  bagisto_storage:
  bagisto_bootstrap_cache:
  bagisto_mysql:
  bagisto_redis:
  bagisto_elasticsearch:
