default:
  tags:
    - bagisto
  image: webkul/bagisto:2.4.4
  before_script:
    - set -e

    # Fix nginx IPv6 issue.
    - sed -i 's/listen \[::\]:80.*;/#/g' /etc/nginx/conf.d/bagisto.conf

    # Start services.
    - /usr/bin/supervisord -c /etc/supervisor/supervisord.conf &
    - sleep 10

variables:
  # Path to the e2e-pw folder. The skeleton repo IS the e2e-pw, so it
  # defaults to $CI_PROJECT_DIR. When you adapt this CI for a module,
  # override to the module's e2e-pw path, for example:
  #   E2E_PATH: "/var/www/bagisto/packages/Webkul/QuestionAnswer/tests/e2e-pw"
  E2E_PATH: "$CI_PROJECT_DIR"

stages:
  - base-test
  - module-test

# =========================
# STAGE 1: BASE TEST
# =========================
"Base Test":
  stage: base-test

  script:
    # Setup test.
    - php -v
    - cd /var/www/bagisto
    - php artisan --version

    # Health check.
    - |
      for i in {1..20}; do
        STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://127.0.0.1/up || true)
        echo "Attempt $i: HTTP $STATUS."

        if [ "$STATUS" = "200" ]; then
          echo "✅ Base app is up."
          exit 0
        fi

        sleep 2
      done

    - echo "❌ Base app failed."
    - exit 1


# =========================
# STAGE 2: MODULE TEST
# =========================
"Module Test":
  stage: module-test
  needs:
    - "Base Test"

  script:
    - cd /var/www/bagisto

    # Wait for the base app to be reachable (this stage runs in its
    # own fresh container, so stage 1's health check doesn't carry).
    - |
      HEALTH_OK=0
      for i in {1..20}; do
        STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://127.0.0.1/up || true)
        echo "Attempt $i: HTTP $STATUS."

        if [ "$STATUS" = "200" ]; then
          echo "✅ Base app is up."
          HEALTH_OK=1
          break
        fi

        sleep 2
      done

      if [ "$HEALTH_OK" != "1" ]; then
        echo "❌ Base app not reachable in stage 2."
        exit 1
      fi

    # Warm up the admin login page so the first navigation in
    # Playwright doesn't pay route/view compilation cost.
    - 'curl -o /dev/null -s -w "warmup /admin/login=%{http_code}\n" http://127.0.0.1/admin/login || true'

    # ============================================================
    # TODO (when adapting for a module): install your module here.
    #
    # The skeleton runs as-is against base Bagisto — its seed test
    # (tests/shop/homepage.spec.ts) only checks that BAGISTO_BASE_URL
    # serves the storefront, so no module install is needed.
    #
    # When you fork this CI into a module, add steps like:
    #   1. Copy module into Bagisto:
    #        cp -r "$CI_PROJECT_DIR/packages/Webkul/<Module>" packages/Webkul
    #
    #   2. Add the PSR-4 namespace entry to composer.json:
    #        "Webkul\\<Module>\\": "packages/Webkul/<Module>/src"
    #
    #   3. Register the service provider in bootstrap/providers.php:
    #        Webkul\<Module>\Providers\<Module>ServiceProvider::class
    #
    #   4. Refresh autoload + run module install + clear caches:
    #        composer dump-autoload
    #        php artisan <your-module>:install
    #        php artisan optimize:clear
    #
    #   5. (Optional) Health-check the app after install to make sure
    #      the module didn't break anything before running e2e.
    #
    #   6. Override E2E_PATH (in the variables block above) to:
    #        /var/www/bagisto/packages/Webkul/<Module>/tests/e2e-pw
    #
    # Reference implementation: see the QuestionAnswer module's
    # .gitlab-ci.yml for a full working example.
    # ============================================================

    # Install Node.js (image ships without it).
    - |
      if ! command -v node >/dev/null 2>&1; then
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      fi
    - node -v
    - npm -v

    # Playwright test setup.
    - cd "$E2E_PATH"
    - |
      cat > .env <<EOF
      BAGISTO_VERSION=2.4
      BAGISTO_BASE_URL=http://127.0.0.1
      BAGISTO_ADMIN_EMAIL=admin@example.com
      BAGISTO_ADMIN_PASSWORD=admin123
      ACTION_TIMEOUT=15000
      NAVIGATION_TIMEOUT=30000
      HEADED=false
      EOF
    - npm install
    - npm run install:browsers

    # Run Playwright tests.
    - npx playwright test --reporter=list

  after_script:
    # Save test results and report into $CI_PROJECT_DIR for artifact upload.
    # When E2E_PATH == $CI_PROJECT_DIR (skeleton mode), reports are already
    # in place and no copy is needed.
    - |
      if [ "$E2E_PATH" != "$CI_PROJECT_DIR" ]; then
        mkdir -p "$CI_PROJECT_DIR/playwright-test-results"
        if [ -d "$E2E_PATH/test-results" ]; then cp -r "$E2E_PATH/test-results" "$CI_PROJECT_DIR/playwright-test-results/" || true; fi
        if [ -d "$E2E_PATH/playwright-report" ]; then cp -r "$E2E_PATH/playwright-report" "$CI_PROJECT_DIR/playwright-test-results/" || true; fi
        cd "$CI_PROJECT_DIR" && tar -czf playwright-test-results.tar.gz playwright-test-results 2>/dev/null || true
      fi

  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
      - playwright-test-results/
      - playwright-test-results.tar.gz
    expire_in: 1 day
